name: Build Mobile APK

on:
  push:
    branches: [master]
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android-apk.yml'
  pull_request:
    paths:
      - 'mobile/**'
      - '.github/workflows/mobile-android-apk.yml'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile (controls EXPO_PUBLIC_* env)'
        required: true
        default: 'preview'
        type: choice
        options:
          - development
          - preview
          - production

env:
  # Opt into Node.js 24 for JS-based actions ahead of the June 2026 default switch.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build ${{ matrix.app }} APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        app: [client, driver]

    env:
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL || 'https://taxi-api-cy7a.onrender.com/api' }}
      EXPO_PUBLIC_PUSHER_KEY: ${{ vars.EXPO_PUBLIC_PUSHER_KEY }}
      EXPO_PUBLIC_PUSHER_CLUSTER: ${{ vars.EXPO_PUBLIC_PUSHER_CLUSTER || 'ap1' }}
      # Mapbox pk-token, bundled into JS at build time. Kept out of the
      # repo (GitHub Push Protection treats any Mapbox token as a secret
      # — easier to env-var both halves than to allow-list each pk).
      EXPO_PUBLIC_MAPBOX_TOKEN: ${{ secrets.EXPO_PUBLIC_MAPBOX_TOKEN }}
      # 2GIS MapGL JS demo key — bundled into the driver app for the
      # in-WebView map (replaces Mapbox in driver-side screens to give
      # KG villages proper house-number coverage). Without this the
      # WebView shows blank tiles; the rest of the app still works.
      EXPO_PUBLIC_TWOGIS_KEY: ${{ secrets.EXPO_PUBLIC_TWOGIS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Set up Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-34 build-tools;34.0.0'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            mobile/apps/${{ matrix.app }}/android/.gradle
          key: ${{ runner.os }}-gradle-${{ matrix.app }}-${{ hashFiles('mobile/package-lock.json', format('mobile/apps/{0}/app.json', matrix.app)) }}
          restore-keys: |
            ${{ runner.os }}-gradle-${{ matrix.app }}-

      - name: Install npm dependencies (workspace root)
        working-directory: mobile
        run: |
          # registry.npmjs.org периодически дропает соединение посреди
          # установки (ECONNRESET) на runner'ах. Поднимаем встроенные
          # ретраи npm и оборачиваем всё в цикл — три попытки с паузой
          # лучше, чем падать на флаки сети.
          npm config set fetch-retries 5
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          for attempt in 1 2 3; do
            if npm ci; then
              break
            fi
            if [ "$attempt" = "3" ]; then
              echo "::error::npm ci failed after 3 attempts"
              exit 1
            fi
            echo "npm ci attempt $attempt failed, retrying in 20s..."
            sleep 20
          done

      - name: Write google-services.json from secret (driver only)
        if: matrix.app == 'driver'
        working-directory: mobile/apps/${{ matrix.app }}
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "::error::GOOGLE_SERVICES_JSON secret is not set — Firebase config is required for FCM push to work in the driver app."
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > google-services.json
          echo "google-services.json written ($(wc -c < google-services.json) bytes)"

      - name: Write Mapbox downloads token to ~/.gradle (driver only)
        if: matrix.app == 'driver'
        env:
          MAPBOX_DOWNLOADS_TOKEN: ${{ secrets.MAPBOX_DOWNLOADS_TOKEN }}
        run: |
          # @rnmapbox/maps' Gradle plugin pulls the Mapbox Android SDK from
          # api.mapbox.com/downloads, which is a credentialed private Maven
          # repo. The plugin reads MAPBOX_DOWNLOADS_TOKEN from
          # gradle.properties to populate the Authorization header — without
          # this the assembleRelease step fails on artifact resolution.
          # We never write the sk-token to disk inside the repo: it lives
          # in GitHub Secrets and gets written to the runner's home gradle
          # config for the duration of the build only.
          if [ -z "$MAPBOX_DOWNLOADS_TOKEN" ]; then
            echo "::error::MAPBOX_DOWNLOADS_TOKEN secret is not set — driver APK can't pull the Mapbox Android SDK."
            exit 1
          fi
          mkdir -p ~/.gradle
          echo "MAPBOX_DOWNLOADS_TOKEN=$MAPBOX_DOWNLOADS_TOKEN" >> ~/.gradle/gradle.properties
          echo "Mapbox downloads token written to ~/.gradle/gradle.properties"

      - name: Expo prebuild (generate native android project)
        working-directory: mobile/apps/${{ matrix.app }}
        run: npx expo prebuild --platform android --no-install --clean

      - name: Raise Gradle JVM memory
        working-directory: mobile/apps/${{ matrix.app }}
        run: |
          {
            echo ""
            echo "# Overridden by CI to avoid Metaspace OOM on GitHub runners"
            echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=2"
          } >> android/gradle.properties

      - name: Make gradlew executable
        working-directory: mobile/apps/${{ matrix.app }}
        run: chmod +x android/gradlew

      - name: Build release APK (+ AAB for client → Play Console)
        working-directory: mobile/apps/${{ matrix.app }}/android
        env:
          GRADLE_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=2g"
        run: |
          set -o pipefail
          # Driver app is distributed directly to drivers as APK — no
          # Play Console route, no AAB needed. Client app needs both:
          # APK for direct preview install, AAB for Play Console upload
          # (Google stopped accepting APKs for new submissions in 2021).
          if [ "${{ matrix.app }}" = "client" ]; then
            GRADLE_TASKS="assembleRelease bundleRelease"
          else
            GRADLE_TASKS="assembleRelease"
          fi
          ./gradlew $GRADLE_TASKS \
            -x lint \
            -x lintVitalRelease \
            -x lintVitalAnalyzeRelease \
            -x lintVitalReportRelease \
            --no-daemon \
            --stacktrace 2>&1 | tee /tmp/gradle.log

      - name: Surface Kotlin compile errors on failure
        if: failure()
        run: |
          echo "::group::Kotlin compile errors"
          grep -B1 -A3 -E "e: file://|error:|^[[:space:]]+\^" /tmp/gradle.log | head -200 || true
          echo "::endgroup::"

      - name: Upload gradle log + build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-log-${{ matrix.app }}-${{ github.run_number }}
          path: |
            /tmp/gradle.log
            mobile/apps/${{ matrix.app }}/android/build/reports
            mobile/apps/${{ matrix.app }}/android/app/build/reports
          if-no-files-found: ignore
          retention-days: 7

      - name: Locate and rename APK
        id: apk
        working-directory: mobile/apps/${{ matrix.app }}
        run: |
          APK_PATH=$(find android/app/build/outputs/apk/release -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK produced" >&2
            exit 1
          fi
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="alif-taxi-${{ matrix.app }}-v${APP_VERSION}-build${{ github.run_number }}-${SHORT_SHA}"
          RENAMED_PATH="android/app/build/outputs/apk/release/${ARTIFACT_NAME}.apk"
          mv "$APK_PATH" "$RENAMED_PATH"
          echo "path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"
          echo "name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: mobile/apps/${{ matrix.app }}/${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 14

      - name: Locate and rename AAB (client only)
        if: matrix.app == 'client'
        id: aab
        working-directory: mobile/apps/${{ matrix.app }}
        run: |
          AAB_PATH=$(find android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
          if [ -z "$AAB_PATH" ]; then
            echo "No AAB produced" >&2
            exit 1
          fi
          APP_VERSION=$(node -p "require('./app.json').expo.version")
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          ARTIFACT_NAME="alif-taxi-${{ matrix.app }}-v${APP_VERSION}-build${{ github.run_number }}-${SHORT_SHA}"
          RENAMED_PATH="android/app/build/outputs/bundle/release/${ARTIFACT_NAME}.aab"
          mv "$AAB_PATH" "$RENAMED_PATH"
          echo "path=$RENAMED_PATH" >> "$GITHUB_OUTPUT"
          echo "name=${ARTIFACT_NAME}-aab" >> "$GITHUB_OUTPUT"

      - name: Upload AAB artifact (client only — Play Console upload)
        if: matrix.app == 'client'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.aab.outputs.name }}
          path: mobile/apps/${{ matrix.app }}/${{ steps.aab.outputs.path }}
          if-no-files-found: error
          retention-days: 30
